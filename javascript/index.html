<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Javascript</title>
</head>

<body>
    <h1>Belajar Javascript</h1>
    <p id="Demo">Hello</p>

    <!-- inline -->
    <button onclick="alert('Selamat Datang')">klik saya</button>
    <!-- Internal -->
    <script>
        // ini komentar di js
        // mengubah konten paragraf id=demo
        document.getElementById("Demo").innerHTML = "Text Hello Diubah Menjadi Selamat Datang";

        // mengubah warna teks paragraf id=demo
        document.getElementById("Demo").style.color = "green";

        // menampilkan pesan di console
        console.log("Pesan ini dapat dilihat di console browser");
    </script>
    <!-- External js -->
    <script src="script.js"></script>
</body>

</html>
